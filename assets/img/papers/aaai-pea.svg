<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Prototype entropy alignment visual</title>
  <desc id="desc">Diagrammatic thumbnail for prototype entropy alignment in LLM reasoning.</desc>
  <rect width="720" height="420" rx="18" fill="#f7faf9"/>
  <rect x="24" y="24" width="672" height="372" rx="14" fill="#ffffff" stroke="#c9d8d2"/>
  <text x="360" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111318">Prototype Entropy Alignment</text>
  <g transform="translate(58 96)">
    <rect width="604" height="210" rx="12" fill="#f4fbf8" stroke="#9fc7bf"/>
    <rect x="24" y="44" width="116" height="52" rx="8" fill="#ffffff" stroke="#9fc7bf"/>
    <text x="82" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#303942">Prompt</text>
    <path d="M140 70 H188" stroke="#075b55" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(196 28)">
      <rect width="128" height="74" rx="9" fill="#ffffff" stroke="#9fc7bf"/>
      <text x="64" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075b55">Proxy model</text>
      <rect x="22" y="48" width="18" height="14" fill="#b6d9d2"/><rect x="48" y="40" width="18" height="22" fill="#7fb9ad"/><rect x="74" y="32" width="18" height="30" fill="#0f766e"/><rect x="100" y="44" width="18" height="18" fill="#b6d9d2"/>
    </g>
    <g transform="translate(196 122)">
      <rect width="128" height="62" rx="9" fill="#ffffff" stroke="#9fc7bf"/>
      <text x="64" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#075b55">Policy model</text>
    </g>
    <path d="M324 66 H374" stroke="#075b55" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="384" y="36" width="112" height="74" rx="9" fill="#ffffff" stroke="#d8c9ee" stroke-width="3"/>
    <text x="440" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#303942">entropy</text>
    <text x="440" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#303942">prototypes</text>
    <g fill="#8d78c4"><rect x="408" y="91" width="10" height="12"/><rect x="426" y="82" width="10" height="21"/><rect x="444" y="70" width="10" height="33"/><rect x="462" y="88" width="10" height="15"/></g>
    <path d="M440 110 V138" stroke="#075b55" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="376" y="148" width="130" height="44" rx="9" fill="#e0f2ee" stroke="#0f766e"/>
    <text x="441" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#075b55">cluster reward</text>
    <path d="M506 170 H548" stroke="#075b55" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="552" y="126" width="36" height="76" rx="7" fill="#fff1e2" stroke="#f0a45d"/>
    <text x="570" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#303942">GRPO</text>
  </g>
  <text x="360" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#303942">Reasoning traces are aligned through entropy signatures and reward feedback</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#075b55"/></marker></defs>
