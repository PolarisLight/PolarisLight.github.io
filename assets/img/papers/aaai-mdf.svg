<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">MDF multimodal disentanglement visual</title>
  <desc id="desc">Diagrammatic thumbnail for modality-aware disentanglement and fusion.</desc>
  <rect width="720" height="420" rx="18" fill="#f7faf9"/>
  <rect x="24" y="24" width="672" height="372" rx="14" fill="#ffffff" stroke="#c9d8d2"/>
  <text x="360" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111318">Modality-Aware Disentanglement</text>
  <g transform="translate(60 96)">
    <rect width="600" height="210" rx="12" fill="#fbfdfc" stroke="#d9e2df"/>
    <g font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#303942">
      <text x="80" y="42" text-anchor="middle">Vision</text><text x="80" y="106" text-anchor="middle">Text</text><text x="80" y="170" text-anchor="middle">Audio</text>
    </g>
    <g fill="#e0f2ee" stroke="#0f766e" stroke-width="2"><rect x="130" y="22" width="108" height="42" rx="8"/><rect x="130" y="86" width="108" height="42" rx="8"/><rect x="130" y="150" width="108" height="42" rx="8"/></g>
    <g fill="#7fb9ad"><rect x="156" y="36" width="18" height="14"/><rect x="180" y="30" width="18" height="20"/><rect x="204" y="40" width="18" height="10"/><rect x="156" y="100" width="18" height="14"/><rect x="180" y="94" width="18" height="20"/><rect x="204" y="104" width="18" height="10"/><rect x="156" y="164" width="18" height="14"/><rect x="180" y="158" width="18" height="20"/><rect x="204" y="168" width="18" height="10"/></g>
    <path d="M238 43 H294 M238 107 H294 M238 171 H294" stroke="#075b55" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="304" y="60" width="116" height="92" rx="10" fill="#fff1e2" stroke="#f0a45d"/>
    <text x="362" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#303942">disentangle</text>
    <text x="362" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#303942">specific and shared</text>
    <path d="M420 106 H472" stroke="#075b55" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="482" y="50" width="86" height="112" rx="12" fill="#f4fbf8" stroke="#9fc7bf"/>
    <text x="525" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#075b55">fusion</text>
    <circle cx="508" cy="124" r="12" fill="#7fb9ad"/><circle cx="536" cy="124" r="12" fill="#f0a45d"/><circle cx="522" cy="146" r="12" fill="#8d78c4"/>
  </g>
  <text x="360" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#303942">Shared and modality-specific evidence are separated before fusion</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#075b55"/></marker></defs>
</svg>