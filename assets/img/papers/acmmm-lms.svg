  <path d="M78 206 C178 168 262 156 338 170 C416 184 434 244 510 246 C568 248 592 252 686 278" fill="none" stroke="#60716c" stroke-width="2" opacity="0.62"/>
  <path d="M98 188 C214 134 322 138 398 178 C452 206 488 226 530 214 C554 206 558 158 566 98" fill="none" stroke="#0f766e" stroke-width="3" opacity="0.36"/>

