<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">METORIE information extraction visual</title>
  <desc id="desc">Diagrammatic thumbnail for metaphor and trap based cross-domain information extraction.</desc>
  <rect width="720" height="420" rx="18" fill="#f7faf9"/>
  <rect x="24" y="24" width="672" height="372" rx="14" fill="#ffffff" stroke="#c9d8d2"/>
  <text x="360" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111318">METORIE Cross-Domain Extraction</text>
  <g transform="translate(62 94)">
    <rect width="190" height="218" rx="12" fill="#fbfdfc" stroke="#d9e2df"/>
    <text x="95" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#303942">source text</text>
    <g fill="#d9e2df"><rect x="30" y="62" width="128" height="10" rx="5"/><rect x="30" y="90" width="98" height="10" rx="5"/><rect x="30" y="118" width="140" height="10" rx="5"/><rect x="30" y="146" width="110" height="10" rx="5"/></g>
    <rect x="28" y="174" width="134" height="24" rx="12" fill="#fff1e2" stroke="#f0a45d"/>
    <text x="95" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#303942">metaphor and trap</text>
  </g>
  <path d="M260 202 H330" stroke="#075b55" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(344 96)">
    <rect width="132" height="214" rx="12" fill="#f4fbf8" stroke="#9fc7bf"/>
    <text x="66" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#075b55">fine-tune</text>
    <circle cx="66" cy="84" r="34" fill="#e0f2ee" stroke="#0f766e" stroke-width="3"/>
    <path d="M48 84 H84 M66 66 V102" stroke="#075b55" stroke-width="4"/>
    <rect x="34" y="144" width="64" height="34" rx="8" fill="#ffffff" stroke="#9fc7bf"/>
    <text x="66" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#303942">adapter</text>
  </g>
  <path d="M482 202 H548" stroke="#075b55" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(560 94)">
    <rect width="104" height="218" rx="12" fill="#fff" stroke="#d9e2df"/>
    <text x="52" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#303942">entities</text>
    <g fill="#e0f2ee" stroke="#0f766e" stroke-width="2"><rect x="22" y="62" width="60" height="24" rx="7"/><rect x="22" y="108" width="60" height="24" rx="7"/><rect x="22" y="154" width="60" height="24" rx="7"/></g>
    <g font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#075b55"><text x="52" y="79" text-anchor="middle">role</text><text x="52" y="125" text-anchor="middle">event</text><text x="52" y="171" text-anchor="middle">relation</text></g>
  </g>
  <text x="360" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#303942">Metaphor and trap examples improve extraction transfer across domains</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#075b55"/></marker></defs>
