<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal learning research visual</title>
  <desc id="desc">Vision, text, and audio representations aligned into a shared space.</desc>
  <rect width="720" height="420" rx="18" fill="#f7faf9"/>
  <rect x="32" y="32" width="656" height="356" rx="16" fill="#ffffff" stroke="#c9d8d2"/>
  <text x="360" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111318">Multimodal Learning</text>
  <g transform="translate(82 120)" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#303942">
    <rect x="0" y="0" width="128" height="64" rx="12" fill="#e0f2ee" stroke="#0f766e"/>
    <text x="64" y="39" text-anchor="middle">Vision</text>
    <rect x="0" y="92" width="128" height="64" rx="12" fill="#fff1e2" stroke="#f0a45d"/>
    <text x="64" y="131" text-anchor="middle">Text</text>
    <rect x="0" y="184" width="128" height="64" rx="12" fill="#eee9fb" stroke="#8d78c4"/>
    <text x="64" y="223" text-anchor="middle">Audio</text>
  </g>
  <g stroke="#075b55" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M214 152 C284 146 314 176 340 206"/>
    <path d="M214 244 H334"/>
    <path d="M214 336 C284 342 314 310 340 276"/>
  </g>
  <g transform="translate(356 132)">
    <circle cx="112" cy="112" r="96" fill="#f4fbf8" stroke="#9fc7bf" stroke-width="3"/>
    <ellipse cx="112" cy="112" rx="70" ry="32" fill="none" stroke="#0f766e" stroke-width="4" transform="rotate(24 112 112)"/>
    <ellipse cx="112" cy="112" rx="70" ry="32" fill="none" stroke="#f0a45d" stroke-width="4" transform="rotate(-24 112 112)"/>
    <ellipse cx="112" cy="112" rx="70" ry="32" fill="none" stroke="#8d78c4" stroke-width="4" transform="rotate(90 112 112)"/>
    <circle cx="112" cy="112" r="24" fill="#0f766e" opacity="0.88"/>
    <text x="112" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#075b55">shared representation</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#075b55"/></marker></defs>
</svg>